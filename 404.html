<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
    <p>Moving to wigm.pl<br><img src="http://wjgm.pl/img/alone.png" loading="lazy"> If you aren't redirected, <a id="manual-link" href="#">click here</a>.</p>
    <script>
        let location = window.location;//why
        const newURL = "https://wjgm.pl" + location.hash + location.search + location.pathname;
        window.location.replace(newURL);
        document.getElementById('manual-link').href = newUrl;
    </script>
</body>
</html>
